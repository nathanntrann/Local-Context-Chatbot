<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InspectAssist</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242736;
            --border: #2d3044;
            --text: #e4e4e7;
            --text-muted: #8b8d98;
            --accent: #6c8aff;
            --accent-hover: #5a75e6;
            --user-bg: #1e3a5f;
            --assistant-bg: #1a1d27;
            --error: #ff6b6b;
            --success: #4ecdc4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 span.logo {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .header-actions button:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 14px 18px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            background: var(--user-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.assistant .tool-indicator {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
            font-style: italic;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .message code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .message pre {
            background: var(--bg);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message pre code {
            background: none;
            padding: 0;
        }

        .message strong { color: var(--accent); }

        .message h1, .message h2, .message h3, .message h4 {
            margin: 12px 0 6px 0;
            color: var(--text);
        }

        .message ul, .message ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .message table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }

        .message th, .message td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
            font-size: 13px;
        }

        .message th { background: var(--surface2); }

        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-style: italic;
        }

        .thinking .dots span {
            animation: blink 1.4s infinite both;
            font-size: 20px;
        }
        .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        #input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            flex-shrink: 0;
        }

        #input-area form {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        #input-area textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 160px;
            line-height: 1.4;
        }

        #input-area textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        #input-area button[type="submit"] {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        #input-area button[type="submit"]:hover { background: var(--accent-hover); }
        #input-area button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .welcome {
            text-align: center;
            color: var(--text-muted);
            margin: auto;
            max-width: 500px;
        }

        .welcome h2 { color: var(--text); margin-bottom: 12px; font-size: 22px; }
        .welcome p { margin-bottom: 16px; font-size: 14px; line-height: 1.6; }

        .welcome .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .welcome .suggestions button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .welcome .suggestions button:hover {
            border-color: var(--accent);
            background: var(--surface);
        }
    </style>
</head>
<body>
    <header>
        <h1><span class="logo">IA</span> InspectAssist</h1>
        <div class="header-actions">
            <button onclick="newChat()">New Chat</button>
        </div>
    </header>

    <div id="chat-container">
        <div class="welcome" id="welcome">
            <h2>InspectAssist</h2>
            <p>Context-aware assistant for thermal inspection.<br>
            Ask about your dataset, analyze images, or troubleshoot issues.</p>
            <div class="suggestions">
                <button onclick="sendSuggestion(this)">What does my dataset look like?</button>
                <button onclick="sendSuggestion(this)">Are any PASS images mislabeled?</button>
                <button onclick="sendSuggestion(this)">What makes a good thermal seal?</button>
                <button onclick="sendSuggestion(this)">How do I troubleshoot false positives?</button>
            </div>
        </div>
    </div>

    <div id="input-area">
        <form onsubmit="handleSubmit(event)">
            <textarea id="user-input" placeholder="Ask about your inspection dataset..."
                rows="1" autofocus></textarea>
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        let conversationId = null;
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcome = document.getElementById('welcome');

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });

        // Enter to send, Shift+Enter for newline
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit(e);
            }
        });

        function sendSuggestion(btn) {
            userInput.value = btn.textContent;
            handleSubmit(new Event('submit'));
        }

        function newChat() {
            conversationId = null;
            chatContainer.innerHTML = '';
            chatContainer.appendChild(welcome);
            welcome.style.display = 'block';
        }

        function addMessage(role, content) {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;

            if (role === 'assistant') {
                div.innerHTML = renderMarkdown(content);
            } else {
                div.textContent = content;
            }

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function addThinking() {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'thinking';
            div.innerHTML = '<div class="thinking">Thinking<div class="dots"><span>.</span><span>.</span><span>.</span></div></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function renderMarkdown(text) {
            // Basic markdown rendering
            let html = text
                // Code blocks
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Headers
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                // Unordered lists
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                // Numbered lists
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                // Horizontal rules
                .replace(/^---$/gm, '<hr>')
                // Line breaks (but not inside pre blocks)
                .replace(/\n/g, '<br>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/(<li>.*?<\/li>(<br>)?)+/g, function(match) {
                return '<ul>' + match.replace(/<br>/g, '') + '</ul>';
            });

            return html;
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg) return;

            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            addMessage('user', msg);
            addThinking();

            try {
                const res = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: msg,
                        conversation_id: conversationId
                    })
                });

                removeThinking();

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ detail: 'Request failed' }));
                    addMessage('error', `Error: ${err.detail || res.statusText}`);
                    return;
                }

                const data = await res.json();
                conversationId = data.conversation_id;
                addMessage('assistant', data.response);
            } catch (err) {
                removeThinking();
                addMessage('error', `Connection error: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
