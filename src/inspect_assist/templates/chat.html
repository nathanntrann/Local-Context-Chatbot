<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InspectAssist</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242736;
            --border: #2d3044;
            --text: #e4e4e7;
            --text-muted: #8b8d98;
            --accent: #6c8aff;
            --accent-hover: #5a75e6;
            --user-bg: #1e3a5f;
            --assistant-bg: #1a1d27;
            --error: #ff6b6b;
            --success: #4ecdc4;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #sidebar-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        #sidebar-toggle:hover { color: var(--text); border-color: var(--accent); }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 span.logo {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .header-actions button:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-selector select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            min-width: 160px;
        }

        .model-selector select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .model-selector label {
            color: var(--text-muted);
            font-size: 12px;
            white-space: nowrap;
        }

        /* API key modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 90vw;
        }

        .modal h3 {
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .modal input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal input::placeholder { color: var(--text-muted); }

        .modal .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal .modal-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 13px;
        }

        .modal .btn-cancel {
            background: var(--surface2);
            color: var(--text-muted);
        }

        .modal .btn-confirm {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .modal .btn-confirm:hover { background: var(--accent-hover); }

        /* Main layout: sidebar + chat */
        #main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: margin-left 0.2s ease;
        }

        #sidebar.collapsed {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        #sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #sidebar-header h3 {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #sidebar-search {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
        }

        #sidebar-search:focus { outline: none; border-color: var(--accent); }
        #sidebar-search::placeholder { color: var(--text-muted); }

        #conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .conv-item {
            padding: 10px 12px;
            cursor: pointer;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .conv-item:hover { background: var(--surface2); }
        .conv-item.active { border-left-color: var(--accent); background: var(--surface2); }

        .conv-item-info {
            flex: 1;
            overflow: hidden;
        }

        .conv-item-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-item-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .conv-item-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .conv-item:hover .conv-item-actions { opacity: 1; }

        .conv-item-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 13px;
        }

        .conv-item-actions button:hover { color: var(--text); background: var(--border); }

        #sidebar-empty {
            padding: 20px 12px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Chat area */
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 14px 18px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            background: var(--user-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .message code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .message pre {
            background: var(--bg);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message pre code {
            background: none;
            padding: 0;
        }

        .message strong { color: var(--accent); }

        .feedback-bar {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid var(--border);
        }

        .feedback-bar button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }

        .feedback-bar button:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .feedback-bar button.selected-up {
            background: rgba(78, 205, 196, 0.15);
            border-color: var(--success);
            color: var(--success);
        }

        .feedback-bar button.selected-down {
            background: rgba(255, 107, 107, 0.15);
            border-color: var(--error);
            color: var(--error);
        }

        .feedback-bar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Suggestions bar (after assistant messages) */
        .suggestions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            padding-top: 6px;
        }

        .suggestions-bar button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        .suggestions-bar button:hover {
            border-color: var(--accent);
            background: var(--surface);
        }

        /* Image attachments */
        .attachments {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .attachments figure {
            margin: 0;
        }

        .attachments img {
            max-width: 300px;
            max-height: 220px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .attachments img:hover { border-color: var(--accent); }

        .attachments figcaption {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: center;
        }

        /* Image lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
        }

        .message h1, .message h2, .message h3, .message h4 {
            margin: 12px 0 6px 0;
            color: var(--text);
        }

        .message ul, .message ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .message table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }

        .message th, .message td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
            font-size: 13px;
        }

        .message th { background: var(--surface2); }

        /* Tool activity indicator */
        .tool-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 12px;
            font-style: italic;
        }

        .tool-status .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-style: italic;
        }

        .thinking .dots span {
            animation: blink 1.4s infinite both;
            font-size: 20px;
        }
        .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        #input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            flex-shrink: 0;
        }

        #input-area form {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        #input-area textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 160px;
            line-height: 1.4;
        }

        #input-area textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        #input-area button[type="submit"] {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        #input-area button[type="submit"]:hover { background: var(--accent-hover); }
        #input-area button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .welcome {
            text-align: center;
            color: var(--text-muted);
            margin: auto;
            max-width: 500px;
        }

        .welcome h2 { color: var(--text); margin-bottom: 12px; font-size: 22px; }
        .welcome p { margin-bottom: 16px; font-size: 14px; line-height: 1.6; }

        .welcome .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .welcome .suggestions button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .welcome .suggestions button:hover {
            border-color: var(--accent);
            background: var(--surface);
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; }
            #sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-width)); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle conversations">&#9776;</button>
            <h1><span class="logo">IA</span> InspectAssist</h1>
        </div>
        <div class="header-actions">
            <div class="model-selector">
                <label for="model-select">Model:</label>
                <select id="model-select" onchange="onModelChange(this)">
                    <option value="">Loading...</option>
                </select>
            </div>
            <button onclick="newChat()">New Chat</button>
        </div>
    </header>

    <!-- API key modal for cloud providers -->
    <div class="modal-overlay" id="api-key-modal">
        <div class="modal">
            <h3 id="modal-title">API Key Required</h3>
            <input type="password" id="modal-api-key" placeholder="API Key">
            <input type="text" id="modal-endpoint" placeholder="Endpoint URL (Azure only)" style="display:none">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="cancelModelSwitch()">Cancel</button>
                <button class="btn-confirm" onclick="confirmModelSwitch()">Connect</button>
            </div>
        </div>
    </div>

    <!-- Image lightbox -->
    <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="" alt="Expanded view">
    </div>

    <div id="main-layout">
        <!-- Conversation sidebar -->
        <aside id="sidebar" class="collapsed">
            <div id="sidebar-header">
                <h3>Conversations</h3>
                <input type="text" id="sidebar-search" placeholder="Search conversations...">
            </div>
            <div id="conversation-list">
                <div id="sidebar-empty">No conversations yet</div>
            </div>
        </aside>

        <!-- Chat area -->
        <div id="chat-area">
            <div id="chat-container">
                <div class="welcome" id="welcome">
                    <h2>InspectAssist</h2>
                    <p>Context-aware assistant for thermal inspection.<br>
                    Ask about your dataset, analyze images, or troubleshoot issues.</p>
                    <div class="suggestions">
                        <button onclick="sendSuggestion(this)">What does my dataset look like?</button>
                        <button onclick="sendSuggestion(this)">Are any PASS images mislabeled?</button>
                        <button onclick="sendSuggestion(this)">What makes a good thermal seal?</button>
                        <button onclick="sendSuggestion(this)">How do I troubleshoot false positives?</button>
                    </div>
                </div>
            </div>

            <div id="input-area">
                <form onsubmit="handleSubmit(event)">
                    <textarea id="user-input" placeholder="Ask about your inspection dataset..."
                        rows="1" autofocus></textarea>
                    <button type="submit" id="send-btn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let conversationId = null;
        let messageIndex = 0;  // tracks assistant message count for feedback
        let pendingSwitch = null;  // {provider, model} waiting for API key
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcome = document.getElementById('welcome');
        const modelSelect = document.getElementById('model-select');

        // Tool name → human-friendly label
        const TOOL_LABELS = {
            search_knowledge: 'Searching knowledge base',
            search_knowledge_filtered: 'Searching knowledge base',
            get_article_section: 'Reading article',
            explain_concept: 'Looking up concept',
            analyze_image: 'Analyzing image',
            compare_images: 'Comparing images',
            find_suspicious_labels: 'Auditing labels',
            generate_audit_report: 'Generating audit report',
            get_dataset_summary: 'Loading dataset summary',
            get_dataset_statistics: 'Calculating statistics',
            get_sample_images: 'Fetching sample images',
        };

        // Load available models + conversation list on page load
        loadModels();
        loadConversations();

        // ------- Model management -------

        async function loadModels() {
            try {
                const res = await fetch('/api/v1/models');
                if (!res.ok) return;
                const models = await res.json();

                modelSelect.innerHTML = '';
                const groups = {};
                models.forEach(m => {
                    if (!groups[m.provider]) groups[m.provider] = [];
                    groups[m.provider].push(m);
                });

                const providerLabels = {
                    ollama: '🖥️ Local (Ollama)',
                    openai: '☁️ OpenAI',
                    azure_openai: '☁️ Azure OpenAI'
                };

                for (const [provider, items] of Object.entries(groups)) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = providerLabels[provider] || provider;
                    items.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.id;
                        opt.textContent = m.name;
                        opt.dataset.provider = m.provider;
                        if (m.active) opt.selected = true;
                        optgroup.appendChild(opt);
                    });
                    modelSelect.appendChild(optgroup);
                }
            } catch (e) {
                modelSelect.innerHTML = '<option>Offline</option>';
            }
        }

        function onModelChange(select) {
            const opt = select.selectedOptions[0];
            if (!opt) return;
            const provider = opt.dataset.provider;
            const model = opt.textContent;

            if (provider === 'ollama') {
                switchModel(provider, model);
            } else {
                // Cloud provider — show API key modal
                pendingSwitch = { provider, model };
                document.getElementById('modal-title').textContent =
                    provider === 'openai' ? 'OpenAI API Key' : 'Azure OpenAI Credentials';
                document.getElementById('modal-endpoint').style.display =
                    provider === 'azure_openai' ? 'block' : 'none';
                document.getElementById('modal-api-key').value = '';
                document.getElementById('modal-endpoint').value = '';
                document.getElementById('api-key-modal').classList.add('active');
            }
        }

        function cancelModelSwitch() {
            document.getElementById('api-key-modal').classList.remove('active');
            pendingSwitch = null;
            loadModels(); // reset dropdown to current active
        }

        async function confirmModelSwitch() {
            if (!pendingSwitch) return;
            const apiKey = document.getElementById('modal-api-key').value.trim();
            const endpoint = document.getElementById('modal-endpoint').value.trim();

            if (!apiKey) {
                document.getElementById('modal-api-key').style.borderColor = 'var(--error)';
                return;
            }

            document.getElementById('api-key-modal').classList.remove('active');
            await switchModel(pendingSwitch.provider, pendingSwitch.model, apiKey, endpoint || undefined);
            pendingSwitch = null;
        }

        async function switchModel(provider, model, apiKey, endpoint) {
            try {
                const body = { provider, model };
                if (apiKey) body.api_key = apiKey;
                if (endpoint) body.endpoint = endpoint;

                const res = await fetch('/api/v1/models/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    addMessage('error', `Failed to switch model: ${err.detail || 'Unknown error'}`);
                    loadModels();
                    return;
                }

                loadModels();
                addMessage('assistant', `Switched to **${model}** (${provider})`);
            } catch (e) {
                addMessage('error', `Model switch failed: ${e.message}`);
                loadModels();
            }
        }

        // ------- Sidebar / conversation history -------

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        let searchDebounce = null;
        document.getElementById('sidebar-search').addEventListener('input', function () {
            clearTimeout(searchDebounce);
            const q = this.value.trim();
            searchDebounce = setTimeout(() => {
                if (q) {
                    searchConversations(q);
                } else {
                    loadConversations();
                }
            }, 300);
        });

        async function loadConversations() {
            try {
                const res = await fetch('/api/v1/conversations');
                if (!res.ok) return;
                const convs = await res.json();
                renderConversationList(convs);
            } catch (e) { /* offline */ }
        }

        async function searchConversations(query) {
            try {
                const res = await fetch('/api/v1/conversations/search?q=' + encodeURIComponent(query));
                if (!res.ok) return;
                const convs = await res.json();
                renderConversationList(convs);
            } catch (e) { /* offline */ }
        }

        function renderConversationList(convs) {
            const list = document.getElementById('conversation-list');
            if (!convs.length) {
                list.innerHTML = '<div id="sidebar-empty">No conversations yet</div>';
                return;
            }
            list.innerHTML = '';
            convs.forEach(c => {
                const item = document.createElement('div');
                item.className = 'conv-item' + (c.id === conversationId ? ' active' : '');
                item.innerHTML = `
                    <div class="conv-item-info" onclick="resumeConversation('${c.id}')">
                        <div class="conv-item-title">${escapeHtml(c.title || 'Untitled')}</div>
                        <div class="conv-item-time">${relativeTime(c.updated_at)}</div>
                    </div>
                    <div class="conv-item-actions">
                        <button onclick="exportConversation('${c.id}')" title="Export">&#8615;</button>
                        <button onclick="deleteConversation('${c.id}')" title="Delete">&#10005;</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function resumeConversation(id) {
            try {
                const res = await fetch('/api/v1/conversations/' + id);
                if (!res.ok) return;
                const detail = await res.json();

                conversationId = detail.id;
                messageIndex = 0;
                chatContainer.innerHTML = '';

                (detail.messages || []).forEach(m => {
                    if (m.role === 'user') {
                        addMessage('user', m.content);
                    } else if (m.role === 'assistant' && m.content) {
                        addMessage('assistant', m.content);
                    }
                });

                highlightActiveConversation();
                // Close sidebar on mobile
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.add('collapsed');
                }
            } catch (e) {
                addMessage('error', `Failed to load conversation: ${e.message}`);
            }
        }

        async function deleteConversation(id) {
            if (!confirm('Delete this conversation?')) return;
            try {
                await fetch('/api/v1/conversations/' + id, { method: 'DELETE' });
                if (id === conversationId) newChat();
                loadConversations();
            } catch (e) { /* ignore */ }
        }

        function exportConversation(id) {
            window.open('/api/v1/conversations/' + id + '/export', '_blank');
        }

        function highlightActiveConversation() {
            document.querySelectorAll('.conv-item').forEach(el => {
                el.classList.toggle('active', el.querySelector('.conv-item-info')?.getAttribute('onclick')?.includes(conversationId));
            });
        }

        function relativeTime(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 7) return days + 'd ago';
            return new Date(iso).toLocaleDateString();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ------- Input handling -------

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });

        // Enter to send, Shift+Enter for newline
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit(e);
            }
        });

        function sendSuggestion(btn) {
            userInput.value = btn.textContent;
            handleSubmit(new Event('submit'));
        }

        function newChat() {
            conversationId = null;
            messageIndex = 0;
            chatContainer.innerHTML = '';
            chatContainer.appendChild(welcome);
            welcome.style.display = 'block';
            highlightActiveConversation();
        }

        // ------- Feedback -------

        async function sendFeedback(btn, msgIdx, rating) {
            if (!conversationId) return;
            const bar = btn.parentElement;
            const buttons = bar.querySelectorAll('button');
            buttons.forEach(b => { b.disabled = true; b.classList.remove('selected-up', 'selected-down'); });
            btn.classList.add(rating === 1 ? 'selected-up' : 'selected-down');
            try {
                await fetch(`/api/v1/conversations/${conversationId}/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message_index: msgIdx, rating })
                });
            } catch (e) {
                buttons.forEach(b => { b.disabled = false; });
                btn.classList.remove('selected-up', 'selected-down');
            }
        }

        // ------- Message rendering -------

        function addMessage(role, content) {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;

            if (role === 'assistant') {
                div.innerHTML = renderMarkdown(content);
                // Add feedback buttons
                if (conversationId) {
                    const idx = messageIndex++;
                    const bar = document.createElement('div');
                    bar.className = 'feedback-bar';
                    bar.innerHTML = `
                        <button onclick="sendFeedback(this, ${idx}, 1)" title="Helpful">👍</button>
                        <button onclick="sendFeedback(this, ${idx}, -1)" title="Not helpful">👎</button>
                    `;
                    div.appendChild(bar);
                }
            } else {
                div.textContent = content;
            }

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function addThinking() {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'thinking';
            div.innerHTML = '<div class="thinking">Thinking<div class="dots"><span>.</span><span>.</span><span>.</span></div></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function updateThinkingStatus(toolName) {
            const el = document.getElementById('thinking');
            if (!el) return;
            const label = TOOL_LABELS[toolName] || toolName;
            el.innerHTML = `<div class="tool-status"><div class="spinner"></div>${escapeHtml(label)}...</div>`;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function addAttachments(messageDiv, attachments) {
            if (!attachments || !attachments.length) return;
            const container = document.createElement('div');
            container.className = 'attachments';
            attachments.forEach(att => {
                if (att.type !== 'image' || !att.data) return;
                const fig = document.createElement('figure');
                const img = document.createElement('img');
                img.src = `data:${att.media_type || 'image/jpeg'};base64,${att.data}`;
                img.alt = att.label || 'Image attachment';
                img.onclick = () => {
                    document.getElementById('lightbox-img').src = img.src;
                    document.getElementById('lightbox').classList.add('active');
                };
                fig.appendChild(img);
                if (att.label) {
                    const cap = document.createElement('figcaption');
                    cap.textContent = att.label;
                    fig.appendChild(cap);
                }
                container.appendChild(fig);
            });
            // Insert before feedback bar if present
            const feedbackBar = messageDiv.querySelector('.feedback-bar');
            if (feedbackBar) {
                messageDiv.insertBefore(container, feedbackBar);
            } else {
                messageDiv.appendChild(container);
            }
        }

        function addSuggestions(messageDiv, suggestions) {
            if (!suggestions || !suggestions.length) return;
            const bar = document.createElement('div');
            bar.className = 'suggestions-bar';
            suggestions.forEach(s => {
                const btn = document.createElement('button');
                btn.textContent = s;
                btn.onclick = () => {
                    // Remove all suggestion bars when one is clicked
                    document.querySelectorAll('.suggestions-bar').forEach(b => b.remove());
                    userInput.value = s;
                    handleSubmit(new Event('submit'));
                };
                bar.appendChild(btn);
            });
            messageDiv.appendChild(bar);
        }

        // ------- Markdown -------

        function renderMarkdown(text) {
            // Basic markdown rendering
            let html = text
                // Code blocks
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Headers
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                // Unordered lists
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                // Numbered lists
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                // Horizontal rules
                .replace(/^---$/gm, '<hr>')
                // Line breaks (but not inside pre blocks)
                .replace(/\n/g, '<br>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/(<li>.*?<\/li>(<br>)?)+/g, function(match) {
                return '<ul>' + match.replace(/<br>/g, '') + '</ul>';
            });

            return html;
        }

        // ------- Streaming chat -------

        async function handleSubmit(e) {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg) return;

            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Remove old suggestion bars
            document.querySelectorAll('.suggestions-bar').forEach(b => b.remove());

            addMessage('user', msg);
            addThinking();

            try {
                const res = await fetch('/api/v1/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: msg,
                        conversation_id: conversationId
                    })
                });

                if (!res.ok) {
                    removeThinking();
                    const err = await res.json().catch(() => ({ detail: 'Request failed' }));
                    addMessage('error', `Error: ${err.detail || res.statusText}`);
                    return;
                }

                // Read SSE stream
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let accumulated = '';
                let msgDiv = null;
                let buffer = '';
                let renderTimer = null;

                function renderAccumulated() {
                    if (msgDiv && accumulated) {
                        msgDiv.innerHTML = renderMarkdown(accumulated);
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }
                }

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete line in buffer

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        let event;
                        try {
                            event = JSON.parse(line.slice(6));
                        } catch { continue; }

                        if (event.type === 'token') {
                            if (!msgDiv) {
                                // First token — replace thinking indicator with real message
                                removeThinking();
                                if (welcome) welcome.style.display = 'none';
                                msgDiv = document.createElement('div');
                                msgDiv.className = 'message assistant';
                                chatContainer.appendChild(msgDiv);
                            }
                            accumulated += event.content;
                            // Debounce markdown re-render to every 80ms
                            if (!renderTimer) {
                                renderTimer = setTimeout(() => {
                                    renderAccumulated();
                                    renderTimer = null;
                                }, 80);
                            }

                        } else if (event.type === 'tool_start') {
                            updateThinkingStatus(event.name);

                        } else if (event.type === 'tool_result') {
                            // Tool done — revert to generic thinking while waiting for next step
                            const el = document.getElementById('thinking');
                            if (el) {
                                el.innerHTML = '<div class="thinking">Thinking<div class="dots"><span>.</span><span>.</span><span>.</span></div></div>';
                            }

                        } else if (event.type === 'done') {
                            removeThinking();
                            conversationId = event.conversation_id;

                            // Final render of accumulated text
                            if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }
                            if (msgDiv && accumulated) {
                                renderAccumulated();
                            } else if (!msgDiv && accumulated) {
                                // Edge: got tokens but no div yet
                                msgDiv = addMessage('assistant', accumulated);
                            }

                            if (msgDiv) {
                                // Add feedback buttons
                                if (conversationId) {
                                    const idx = messageIndex++;
                                    const bar = document.createElement('div');
                                    bar.className = 'feedback-bar';
                                    bar.innerHTML = `
                                        <button onclick="sendFeedback(this, ${idx}, 1)" title="Helpful">👍</button>
                                        <button onclick="sendFeedback(this, ${idx}, -1)" title="Not helpful">👎</button>
                                    `;
                                    msgDiv.appendChild(bar);
                                }

                                // Add image attachments
                                addAttachments(msgDiv, event.attachments);

                                // Add follow-up suggestions
                                addSuggestions(msgDiv, event.suggestions);
                            }

                            // Refresh sidebar
                            loadConversations();
                        }
                    }
                }

                // Flush any remaining render
                if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }
                if (msgDiv && accumulated) renderAccumulated();

            } catch (err) {
                removeThinking();
                addMessage('error', `Connection error: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
